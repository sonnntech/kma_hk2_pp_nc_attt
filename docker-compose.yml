services:
  blockchain-data-pipeline:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./:/app
    command: ["python3", "pipeline/etl_pipeline.py"]
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "test", "-f", "/app/warehouse/warehouse.json"]
      interval: 10s
      timeout: 5s
      retries: 3
